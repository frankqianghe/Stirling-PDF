<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Toolbar</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111827;
        color: #f9fafb;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .bar {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
        app-region: drag;
      }
      .left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #f59e0b;
        box-shadow: 0 0 12px rgba(245,158,11,0.7);
        flex: 0 0 auto;
      }
      .title {
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .subtitle {
        font-size: 12px;
        color: #9ca3af;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
        app-region: no-drag;
      }
      button {
        border: 0;
        border-radius: 10px;
        height: 34px;
        padding: 0 14px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
      }
      .back {
        color: white;
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      }
      .close {
        color: #e5e7eb;
        background: rgba(255,255,255,0.08);
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="left">
        <div class="dot"></div>
        <div>
          <div class="title">PlexPDF Checkout</div>
          <div class="subtitle">After payment, click back to check result</div>
        </div>
      </div>
      <div class="actions">
        <button id="backBtn" class="back">返回并查询支付结果</button>
        <button id="closeBtn" class="close">关闭</button>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('order_id') || '';
      const invoke = window.__TAURI_INTERNALS__?.invoke;

      document.getElementById('backBtn')?.addEventListener('click', async () => {
        if (!invoke) return;
        await invoke('checkout_back_to_status', { orderId });
      });

      document.getElementById('closeBtn')?.addEventListener('click', async () => {
        if (!invoke) return;
        await invoke('close_checkout_webview');
      });
    </script>
  </body>
</html>
